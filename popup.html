<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #3367d6;
    }
    button:active {
      background: #2851a3;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #34a853;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <button id="copyBtn">Struktur kopieren</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
