<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 11px;
      background: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      padding: 8px;
      min-height: 100vh;
    }
    
    .toolbar {
      position: sticky;
      top: 0;
      background: inherit;
      padding-bottom: 8px;
      border-bottom: 1px solid #444;
      margin-bottom: 8px;
    }
    
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }
    
    button:hover {
      background: #1177bb;
    }
    
    button:active {
      background: #0d5a8c;
    }
    
    #status {
      display: inline-block;
      margin-left: 8px;
      color: #4ec9b0;
    }
    
    #tree {
      white-space: pre;
      line-height: 1.5;
      overflow-x: auto;
    }
    
    .hint {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="copyBtn">Kopieren</button>
    <span id="status"></span>
  </div>
  <div id="tree" class="hint">Wähle ein Element im Elements-Panel aus...</div>
  
  <script src="sidebar.js"></script>
</body>
</html>
